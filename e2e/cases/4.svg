<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Test: currentColor with fill-opacity and stroke-opacity -->
  <!-- Columns: fill only | stroke only | fill + stroke -->
  <g stroke-width="4">
    <!-- Row 1: no opacity set -->
    <rect x="5" y="5" width="55" height="40" color="blue" fill="currentColor" />
    <rect x="72" y="5" width="55" height="40" color="red" fill="none" stroke="currentColor" />
    <rect x="139" y="5" width="55" height="40" color="green" fill="currentColor" stroke="currentColor" />
    <!-- Row 2: fill-opacity=0.5 -->
    <rect x="5" y="53" width="55" height="40" color="blue" fill="currentColor" fill-opacity="0.5" />
    <rect x="72" y="53" width="55" height="40" color="red" fill="none" stroke="currentColor" />
    <rect x="139" y="53" width="55" height="40" color="green" fill="currentColor" fill-opacity="0.5" stroke="currentColor" />
    <!-- Row 3: stroke-opacity=0.5 -->
    <rect x="5" y="101" width="55" height="40" color="blue" fill="currentColor" />
    <rect x="72" y="101" width="55" height="40" color="red" fill="none" stroke="currentColor" stroke-opacity="0.5" />
    <rect x="139" y="101" width="55" height="40" color="green" fill="currentColor" stroke="currentColor" stroke-opacity="0.5" />
    <!-- Row 4: fill-opacity=0.5, stroke-opacity=0.5 -->
    <rect x="5" y="149" width="55" height="40" color="blue" fill="currentColor" fill-opacity="0.5" />
    <rect x="72" y="149" width="55" height="40" color="red" fill="none" stroke="currentColor" stroke-opacity="0.5" />
    <rect x="139" y="149" width="55" height="40" color="green" fill="currentColor" fill-opacity="0.5" stroke="currentColor" stroke-opacity="0.5" />
  </g>
</svg>
